name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install Dependencies
        working-directory: ./astro_project
        # Tenta usar cache (npm ci) primeiro, se falhar, faz install limpo
        run: npm ci || npm install
        
      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Inject YouTube API Key (Secured)
        working-directory: ./astro_project
        # Você deve configurar a chave "YOUTUBE_API_KEY" na aba Secrets do seu repositório no Github
        run: echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" > .env
        
      - name: Build with Astro
        working-directory: ./astro_project
        run: npm run build
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./astro_project/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
